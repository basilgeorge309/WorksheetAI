<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scribbl — AI Worksheet Filler</title>
  <style>
    :root {
      --text: #1A1A1A;
      --muted: #6B6B6B;
      --accent: #2563EB;
      --border: #E5E5E5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #FFFFFF;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
    }
    main {
      max-width: 680px;
      margin: 0 auto;
      padding: 24px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .logo {
      width: 96px;
      height: 96px;
      border-radius: 22px;
    }
    h1 {
      font-size: 40px;
      font-weight: 800;
      margin: 20px 0 4px;
    }
    .tagline {
      font-size: 18px;
      color: var(--muted);
      margin: 0 0 28px;
    }
    .links {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .links a {
      display: inline-block;
      padding: 12px 20px;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    .links a:hover { background: #EFF6FF; }
    footer {
      margin-top: 36px;
      font-size: 13px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main>
    <img class="logo" src="icon.png" alt="Scribbl logo" />
    <h1>Scribbl</h1>
    <p class="tagline">AI Worksheet Filler</p>
    <nav class="links">
      <a href="privacy.html">Privacy Policy</a>
      <a href="support.html">Support</a>
    </nav>
    <footer>&copy; 2026 Scribbl</footer>
  </main>
</body>
</html>
